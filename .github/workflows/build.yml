name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS ARM64'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows x64'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'apple-darwin') && 'aarch64-apple-darwin' || '' }}

      - name: Install npm dependencies
        run: npm install

      - name: Build
        run: npx tauri build ${{ matrix.args }}

      - name: Package portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p portable/models
          cp src-tauri/models/*.rten portable/models/
          cp src-tauri/target/release/meter-ocr-app.exe portable/
          cd portable && 7z a ../Meter-OCR-Windows-x64-Portable.zip * && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meter-ocr-${{ matrix.name }}
          path: |
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.exe
            Meter-OCR-Windows-x64-Portable.zip

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
